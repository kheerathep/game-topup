<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#0e141c",
                    "surface": "#0e141c",
                    "secondary-fixed-dim": "#00daf3",
                    "on-primary": "#002979",
                    "on-error": "#690005",
                    "error-container": "#93000a",
                    "on-background": "#dde3ee",
                    "on-secondary": "#00363d",
                    "on-surface-variant": "#c3c6d6",
                    "inverse-on-surface": "#2b3139",
                    "tertiary-fixed": "#eddcff",
                    "surface-container-highest": "#2f353e",
                    "inverse-primary": "#1e55cf",
                    "error": "#ffb4ab",
                    "tertiary-fixed-dim": "#d8b9ff",
                    "surface-container-lowest": "#090f16",
                    "on-secondary-fixed-variant": "#004f58",
                    "on-primary-container": "#00236a",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#001f24",
                    "primary-fixed": "#dbe1ff",
                    "on-tertiary-fixed-variant": "#6300bb",
                    "surface-bright": "#343a42",
                    "secondary-fixed": "#9cf0ff",
                    "surface-container": "#1a2028",
                    "on-primary-fixed-variant": "#003daa",
                    "surface-tint": "#b4c5ff",
                    "on-secondary-container": "#00616d",
                    "tertiary-container": "#ae71ff",
                    "on-tertiary-fixed": "#290055",
                    "primary-container": "#628aff",
                    "inverse-surface": "#dde3ee",
                    "surface-container-low": "#161c24",
                    "on-surface": "#dde3ee",
                    "secondary": "#bdf4ff",
                    "tertiary": "#d8b9ff",
                    "primary-fixed-dim": "#b4c5ff",
                    "outline-variant": "#434654",
                    "secondary-container": "#00e3fd",
                    "surface-container-high": "#242a33",
                    "on-primary-fixed": "#00174c",
                    "surface-variant": "#2f353e",
                    "outline": "#8d909f",
                    "on-tertiary-container": "#3c0076",
                    "surface-dim": "#0e141c",
                    "primary": "#b4c5ff",
                    "on-tertiary": "#450086"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow-primary {
            box-shadow: 0 0 20px rgba(98, 138, 255, 0.3);
        }
        .glass-panel {
            background: rgba(26, 32, 40, 0.7);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col">
<!-- TopAppBar Suppressed for Login Journey as per "The Destination Rule" & "Shell Visibility" -->
<main class="flex-grow flex items-center justify-center relative overflow-hidden py-12 px-4">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[120px] rounded-full"></div>
<!-- Login Canvas -->
<div class="w-full max-w-md z-10">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-bold italic tracking-tighter text-white mb-2">Nexus Core</h1>
<p class="font-label text-on-surface-variant tracking-widest uppercase text-[10px]">Editorial Gaming Excellence</p>
</div>
<!-- Main Auth Card -->
<div class="glass-panel border border-white/5 p-8 md:p-10 rounded-xl relative">
<!-- Decorative Accent -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent"></div>
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-white mb-1">Welcome back</h2>
<p class="text-on-surface-variant text-sm">Secure access to your gaming vault</p>
</div>
<!-- Credentials Form -->
<form action="#" class="space-y-6" onsubmit="return false;">
<div class="space-y-1.5">
<label class="font-label text-xs uppercase tracking-wider text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none text-white px-4 py-3.5 rounded-lg focus:ring-1 focus:ring-secondary/40 placeholder:text-outline-variant transition-all outline-none" id="email" placeholder="commander@nexus.core" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-end px-1">
<label class="font-label text-xs uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-[11px] text-primary hover:text-secondary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none text-white px-4 py-3.5 rounded-lg focus:ring-1 focus:ring-secondary/40 placeholder:text-outline-variant transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bold rounded-lg neon-glow-primary active:scale-[0.98] transition-all flex justify-center items-center gap-2 group">
                        Sign In
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow h-px bg-white/5"></div>
<span class="mx-4 font-label text-[10px] uppercase tracking-[0.2em] text-outline">Authorized Auth</span>
<div class="flex-grow h-px bg-white/5"></div>
</div>
<!-- Social Auth -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors rounded-lg group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 5.04c1.94 0 3.51.68 4.75 1.81l3.51-3.51C17.92 1.19 15.21 0 12 0 7.31 0 3.25 2.67 1.21 6.6L5.16 9.7c.93-2.67 3.44-4.66 6.84-4.66z" fill="#EA4335"></path>
<path d="M23.49 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.29h6.43c-.28 1.44-1.1 2.66-2.33 3.48l3.62 2.81c2.12-1.95 3.34-4.83 3.34-8.31z" fill="#4285F4"></path>
<path d="M5.16 14.3c-.24-.7-.38-1.45-.38-2.3s.14-1.6.38-2.3L1.21 6.6C.44 8.22 0 10.06 0 12s.44 3.78 1.21 5.4l3.95-3.1z" fill="#FBBC05"></path>
<path d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.62-2.81c-1.1.74-2.51 1.18-4.31 1.18-3.4 0-6.27-2.31-7.3-5.43L.84 17.13C2.8 21.2 7.07 24 12 24z" fill="#34A853"></path>
</svg>
<span class="text-sm font-medium text-on-surface group-hover:text-white transition-colors">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors rounded-lg group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.791-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"></path>
</svg>
<span class="text-sm font-medium text-on-surface group-hover:text-white transition-colors">Facebook</span>
</button>
</div>
</div>
<!-- Footer Sign Up Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                    New operative? <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 decoration-primary-container/50 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Decorative UI Element (Asymmetric Detail) -->
<div class="hidden lg:block absolute right-12 bottom-12 w-64 h-64 opacity-20 pointer-events-none">
<img class="w-full h-full object-contain filter grayscale hue-rotate-180" data-alt="abstract tech circuitry pattern with neon cyan and blue glowing lines on a dark obsidian background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLHJ7avI-Wk-X55WfCdxjaiOnyxGbFxbRJD3XJv1x84eZLUpOmO3Hn9nP7loGU5CfHF0CteMQiFGCN51SKH0_bFFO0f82vzFEGt7JDUzGe9b5y3YUheclwkZ86AP4FVGTVXDwt__ULRgjhSvyRxp0XwG7HaOPVRupMIOGtMej5j4pf1iGgR9D8EgCNwi1bc_Tng03GvvpiyF8Q7aHOU4wEIG6RJbdKxo8_bChFP83coCsZWMd3FzlN06VJt9OGMCWWSDsa2erfX-z8"/>
</div>
</main>
<!-- Shared Footer -->
<footer class="bg-slate-950 w-full py-12 px-8 mt-auto tonal-shift border-t border-white/5">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
<div class="flex flex-col items-center md:items-start gap-2">
<span class="text-lg font-black text-slate-200">Nexus Core</span>
<p class="font-['Inter'] text-xs tracking-widest uppercase text-slate-500">© 2024 Nexus Core. Editorial Gaming Excellence.</p>
</div>
<div class="flex gap-8">
<a class="font-['Inter'] text-xs tracking-widest uppercase text-slate-500 hover:text-blue-400 transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs tracking-widest uppercase text-slate-500 hover:text-blue-400 transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs tracking-widest uppercase text-slate-500 hover:text-blue-400 transition-colors opacity-80 hover:opacity-100" href="#">Cookie Settings</a>
</div>
</div>
</footer>
</body></html>
